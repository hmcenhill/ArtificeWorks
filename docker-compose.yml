services:
  postgres:
    image: postgres:16
    container_name: artificeworks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: artificeworks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d artificeworks"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: artificeworks-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: artificeworks-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Epic 9. Collector, Tempo, Loki, Prometheus and Grafana in ONE image behind one OTLP
  # endpoint. Three separate containers (Prometheus + Grafana + Jaeger) is the more conventional
  # split but is three configs to maintain and to self-host in M7; the Aspire dashboard is the
  # nicer UI but keeps nothing between restarts, and 9.2's metrics want retention.
  #
  # Nothing in the system depends on this container being up: an unreachable collector is a
  # startup warning, never a failure to boot. Stop it and the factory keeps running.
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: artificeworks-otel-lgtm
    restart: unless-stopped
    environment:
      # Give Grafana its own home so the anonymous-viewer settings below stick to the volume.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3000:3000"   # Grafana — the thing you actually open
      - "4317:4317"   # OTLP/gRPC — what both hosts export to by default
      - "4318:4318"   # OTLP/HTTP
    volumes:
      - otel_lgtm_data:/data
      # Checked-in dashboard, provisioned on boot (9.2): `docker compose up -d` yields a
      # factory-floor view with no clicking. A demo asset, not a nicety — M7 embeds it.
      - ./docker/grafana/provisioning:/otel-lgtm/grafana/conf/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/otel-lgtm/grafana/dashboards:ro

  # Epic 10. The simulation host: a third deployment unit that publishes and schedules but
  # consumes nothing. It creates orders over the API's front door and runs the world sweep against
  # Postgres — deliberately separate from the workers so the factory can be paced and fed without
  # the consumers being able to slow down, and so it can be stopped without stopping production.
  #
  # Commented out until an image is built for it (M7). Uncomment once `docker build` targets the
  # simulation Dockerfile; for local runs, `dotnet run --project src/ArtificeWorks.Simulation` is
  # the equivalent. Generation and pacing ship OFF — turn them on at PUT /system/simulation, or via
  # the simulation host's appsettings.Development.json, which enables both.
  #
  # simulation:
  #   build:
  #     context: .
  #     dockerfile: src/ArtificeWorks.Simulation/Dockerfile
  #   container_name: artificeworks-simulation
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     ConnectionStrings__ArtificeWorksDatabase: "Host=postgres;Port=5432;Database=artificeworks;Username=postgres;Password=postgres"
  #     Simulation__ApiBaseAddress: "http://api:8080"
  #     Telemetry__OtlpEndpoint: "http://otel-lgtm:4317"

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  otel_lgtm_data:
